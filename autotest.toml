# autotest.toml - Modular Pytest Gen Configuration

source_root = "src"
import_prefix = "doctools"
global_context = []
custom_instructions = ""

[layout]
strategy = "external" 
structure = "nested"  
test_root = "tests"

[discovery]
respect_dunder_all = true
include_classes = true
max_class_lines = 300
exclude_patterns = [
    "*__init__.py",
    "build",
    "tests",
    "*test_*.py"
]
exclude_functions = []

[llm]
provider = "mistral"
model = "codestral-latest"
host = "https://api.mistral.ai"
structured = false
